<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BeB Tower | Dashboard</title>

<script src="themes.js"></script>
<script src="db.js"></script>

<style>

@font-face{
font-family:"Vazirmatn";
src:url("./assets/fonts/Vazirmatn-FD-Regular.woff2") format("woff2");
}

:root{
--bg:#050816;
--surface:#0F172A;
--surface2:#111827;
--card-bg:rgba(255,255,255,.05);
--border:rgba(255,255,255,.08);
--text:#F8FAFC;
--muted:#94A3B8;
--accent:#4cc9f0;
--shadow:0 8px 32px rgba(0,0,0,.25);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Vazirmatn",sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
padding:30px;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top right, rgba(76,201,240,.10), transparent 35%),
radial-gradient(circle at bottom left, rgba(67,97,238,.10), transparent 35%);
pointer-events:none;
}

.container{
max-width:1500px;
margin:auto;
}

.header{

display:flex;
justify-content:space-between;
align-items:center;
gap:20px;

margin-bottom:30px;

}

.logo{
font-size:2rem;
font-weight:700;
}

.logo span{
color:var(--accent);
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{

padding:12px 16px;

border-radius:14px;

border:1px solid var(--border);

background:var(--card-bg);

backdrop-filter:blur(20px);

color:var(--text);

cursor:pointer;

font-family:inherit;

}

.hero{

padding:35px;

border-radius:28px;

background:var(--hero-gradient,var(--card-bg));

border:1px solid var(--border);

margin-bottom:25px;

box-shadow:var(--shadow);

}

.hero h1{
margin-bottom:10px;
}

.hero p{
color:var(--muted);
line-height:2;
}

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:18px;

margin-bottom:25px;

}

.stat{

padding:25px;

border-radius:24px;

background:var(--card-bg);

border:1px solid var(--border);

backdrop-filter:blur(20px);

box-shadow:var(--shadow);

}

.stat-number{

font-size:2rem;

font-weight:700;

margin-top:10px;

color:var(--accent);

}

.grid{

display:grid;

grid-template-columns:
2fr 1fr;

gap:20px;

}

.card{

background:var(--card-bg);

border:1px solid var(--border);

border-radius:24px;

padding:22px;

backdrop-filter:blur(20px);

box-shadow:var(--shadow);

}

.card h3{
margin-bottom:18px;
}

.activity{

padding:12px;

border-bottom:1px solid var(--border);

}

.activity:last-child{
border-bottom:none;
}

.quick-links{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:12px;

}

.link{

display:flex;

align-items:center;

justify-content:center;

text-decoration:none;

color:var(--text);

padding:18px;

border-radius:18px;

background:rgba(255,255,255,.03);

border:1px solid var(--border);

transition:.2s;

}

.link:hover{

border-color:var(--accent);

transform:translateY(-3px);

}

.footer{

margin-top:25px;

text-align:center;

color:var(--muted);

font-size:.9rem;

}

@media(max-width:1000px){

.grid{
grid-template-columns:1fr;
}

.quick-links{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
BeB <span>Tower</span>
</div>

<div class="actions">

<a href="index.html">
<button class="btn">صفحه اصلی</button>
</a>

<button class="btn" onclick="location.reload()">
بروزرسانی
</button>

</div>

</div>

<section class="hero">

<h1>My Mind Command Center</h1>

<p>
مرکز مدیریت پروژه‌ها، دانش، ایده‌ها و دارایی‌های دیجیتال
</p>

</section>

<div class="stats">

<div class="stat">
<div>یادداشت‌ها</div>
<div id="notesCount" class="stat-number">0</div>
</div>

<div class="stat">
<div>ایده‌ها</div>
<div id="ideasCount" class="stat-number">0</div>
</div>

<div class="stat">
<div>پروژه‌ها</div>
<div id="projectsCount" class="stat-number">0</div>
</div>

<div class="stat">
<div>مطالب ذخیره شده</div>
<div id="capturesCount" class="stat-number">0</div>
</div>

</div>

<div class="grid">

<div class="card">

<h3>
آخرین فعالیت‌ها
</h3>

<div id="activities"></div>

</div>

<div class="card">

<h3>
دسترسی سریع
</h3>

<div class="quick-links">

<a class="link" href="notes.html">
📝 یادداشت‌ها
</a>

<a class="link" href="ideas.html">
💡 اتاق فکر
</a>

<a class="link" href="projects.html">
🚀 پروژه‌ها
</a>

<a class="link" href="capture-desk.html">
📥 دریافت مطالب
</a>

<a class="link" href="academy.html">
🎓 آموزشگاه
</a>

<a class="link" href="coming-soon.html">
📚 تالار فرهنگ
</a>

</div>

</div>

</div>

<div class="footer">

BeB Tower Dashboard v1.2.0

</div>

</div>

<script>

function loadDashboard(){

const stats = BeBDB.stats();

document.getElementById(
"notesCount"
).textContent = stats.notes;

document.getElementById(
"ideasCount"
).textContent = stats.ideas;

document.getElementById(
"projectsCount"
).textContent = stats.projects;

document.getElementById(
"capturesCount"
).textContent = stats.captures;

const db = BeBDB.load();

let activities = [];

db.notes.forEach(x=>{
activities.push({
type:"یادداشت",
title:x.title || "بدون عنوان"
});
});

db.ideas.forEach(x=>{
activities.push({
type:"ایده",
title:x.title || "بدون عنوان"
});
});

db.projects.forEach(x=>{
activities.push({
type:"پروژه",
title:x.title || "بدون عنوان"
});
});

db.captures.forEach(x=>{
activities.push({
type:"مطلب",
title:x.title || "بدون عنوان"
});
});

activities = activities.slice(0,15);

const container =
document.getElementById(
"activities"
);

if(activities.length===0){

container.innerHTML=`
<div class="activity">
هنوز داده‌ای ثبت نشده است
</div>
`;

return;

}

container.innerHTML="";

activities.forEach(item=>{

container.innerHTML += `
<div class="activity">
<strong>${item.type}</strong>
<br>
${item.title}
</div>
`;

});

}

loadDashboard();

</script>

</body>
</html>
