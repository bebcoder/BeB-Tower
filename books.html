<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BeB Tower | Library</title>

<script src="themes.js"></script>
<script src="db.js"></script>

<style>

@font-face{
font-family:"Vazirmatn";
src:url("./assets/fonts/Vazirmatn-FD-Regular.woff2") format("woff2");
}

:root{
--bg:#050816;
--card-bg:rgba(255,255,255,.05);
--border:rgba(255,255,255,.08);
--text:#f8fafc;
--muted:#94a3b8;
--accent:#4cc9f0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Vazirmatn",sans-serif;
background:var(--bg);
color:var(--text);
padding:30px;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top right,rgba(76,201,240,.10),transparent 30%),
radial-gradient(circle at bottom left,rgba(67,97,238,.10),transparent 30%);
pointer-events:none;
}

.container{
max-width:1600px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.card{
background:var(--card-bg);
border:1px solid var(--border);
border-radius:24px;
padding:20px;
backdrop-filter:blur(20px);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
gap:20px;
}

.book{
background:var(--card-bg);
border:1px solid var(--border);
border-radius:20px;
padding:18px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:12px;
border-radius:12px;
border:1px solid var(--border);
background:rgba(255,255,255,.04);
color:var(--text);
font-family:inherit;
}

button{
padding:12px 16px;
border:none;
border-radius:12px;
cursor:pointer;
background:var(--accent);
color:white;
font-family:inherit;
}

.actions{
display:flex;
gap:8px;
margin-top:12px;
flex-wrap:wrap;
}

.meta{
font-size:.85rem;
color:var(--muted);
margin-top:12px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>📚 کتابخانه</h1>

<a href="dashboard.html">
<button>بازگشت</button>
</a>

</div>

<div class="card">

<input id="title" placeholder="نام کتاب">

<input id="author" placeholder="نویسنده">

<input id="category" placeholder="دسته بندی">

<input id="tags" placeholder="برچسب ها">

<input id="file" placeholder="مسیر فایل">

<input id="link" placeholder="لینک دانلود">

<textarea id="description" placeholder="توضیحات"></textarea>

<button onclick="saveBook()">
ثبت کتاب
</button>

</div>

<div id="books" class="grid"></div>

</div>

<script>

let db=BeBDB.load();

if(!db.books){
db.books=[];
}

function saveDB(){
BeBDB.save(db);
}

function saveBook(){

const title=
document.getElementById("title").value;

if(!title.trim()) return;

db.books.unshift({

id:Date.now(),

title:title,

author:
document.getElementById("author").value,

category:
document.getElementById("category").value,

tags:
document.getElementById("tags").value,

file:
document.getElementById("file").value,

link:
document.getElementById("link").value,

description:
document.getElementById("description").value,

created:
new Date().toLocaleString("fa-IR")

});

saveDB();

location.reload();

}

function deleteBook(id){

db.books=
db.books.filter(
x=>x.id!==id
);

saveDB();

render();

}

function render(){

const box=
document.getElementById("books");

box.innerHTML="";

db.books.forEach(book=>{

box.innerHTML+=`

<div class="book">

<h3>${book.title}</h3>

<p>✍️ ${book.author||"-"}</p>

<p>🏷 ${book.category||"-"}</p>

<p>${book.description||""}</p>

${book.link ?
`<p><a target="_blank" href="${book.link}">🔗 دانلود</a></p>`
:
""}

${book.file ?
`<p>📁 ${book.file}</p>`
:
""}

<div class="meta">

ثبت:
${book.created}

</div>

<div class="actions">

<button
onclick="deleteBook(${book.id})">
حذف
</button>

</div>

</div>

`;

});

}

render();

</script>

</body>

</html>
