<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BeB Tower | Gramophone</title>

<script src="themes.js"></script>
<script src="db.js"></script>

<style>

@font-face{
font-family:"Vazirmatn";
src:url("./assets/fonts/Vazirmatn-FD-Regular.woff2") format("woff2");
}

:root{
--bg:#050816;
--card-bg:rgba(255,255,255,.05);
--border:rgba(255,255,255,.08);
--text:#f8fafc;
--muted:#94a3b8;
--accent:#4cc9f0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Vazirmatn",sans-serif;
background:var(--bg);
color:var(--text);
padding:30px;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top right,rgba(76,201,240,.10),transparent 30%),
radial-gradient(circle at bottom left,rgba(67,97,238,.10),transparent 30%);
pointer-events:none;
}

.container{
max-width:1600px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.card{
background:var(--card-bg);
border:1px solid var(--border);
border-radius:24px;
padding:20px;
backdrop-filter:blur(20px);
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
gap:20px;
}

.music{
background:var(--card-bg);
border:1px solid var(--border);
border-radius:20px;
padding:18px;
}

input,
textarea{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:12px;
border-radius:12px;
border:1px solid var(--border);
background:rgba(255,255,255,.04);
color:var(--text);
font-family:inherit;
}

button{
padding:12px 16px;
border:none;
border-radius:12px;
cursor:pointer;
background:var(--accent);
color:white;
font-family:inherit;
}

.actions{
display:flex;
gap:8px;
margin-top:12px;
}

.meta{
font-size:.85rem;
color:var(--muted);
margin-top:12px;
}

a{
color:var(--accent);
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🎵 گرامافون</h1>

<a href="dashboard.html">
<button>بازگشت</button>
</a>

</div>

<div class="card">

<input id="title" placeholder="نام آهنگ">

<input id="artist" placeholder="خواننده">

<input id="album" placeholder="آلبوم">

<input id="genre" placeholder="سبک">

<input id="year" placeholder="سال">

<input id="link" placeholder="لینک تلگرام یا دانلود">

<textarea id="description" placeholder="یادداشت"></textarea>

<button onclick="saveMusic()">
ثبت آهنگ
</button>

</div>

<div id="musicList" class="grid"></div>

</div>

<script>

let db = BeBDB.load();

if(!db.music){
db.music = [];
}

function saveDB(){
BeBDB.save(db);
}

function saveMusic(){

const title =
document.getElementById("title").value;

if(!title.trim()) return;

db.music.unshift({

id:Date.now(),

title:title,

artist:
document.getElementById("artist").value,

album:
document.getElementById("album").value,

genre:
document.getElementById("genre").value,

year:
document.getElementById("year").value,

link:
document.getElementById("link").value,

description:
document.getElementById("description").value,

created:
new Date().toLocaleString("fa-IR")

});

saveDB();

location.reload();

}

function deleteMusic(id){

db.music =
db.music.filter(
x=>x.id!==id
);

saveDB();

render();

}

function render(){

const box =
document.getElementById("musicList");

box.innerHTML="";

db.music.forEach(item=>{

box.innerHTML += `

<div class="music">

<h3>${item.title}</h3>

<p>🎤 ${item.artist || "-"}</p>

<p>💿 ${item.album || "-"}</p>

<p>🎼 ${item.genre || "-"}</p>

<p>📅 ${item.year || "-"}</p>

<p>${item.description || ""}</p>

${item.link ?

`<p>
<a href="${item.link}" target="_blank">
🔗 مشاهده
</a>
</p>`

: ""}

<div class="meta">

ثبت:
${item.created}

</div>

<div class="actions">

<button
onclick="deleteMusic(${item.id})">
حذف
</button>

</div>

</div>

`;

});

}

render();

</script>

</body>
</html>
